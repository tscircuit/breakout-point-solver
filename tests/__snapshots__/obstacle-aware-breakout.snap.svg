="43.55555555555552" fill="rgba(220, 38, 38, 0.22)" stroke="#b91c1c" stroke-width="0.03214285714285715" transform="rotate(-34.999999999999986 338.6666666666667 298.22222222222223)"/></g><g><rect data-type="rect" data-label="top keepout" data-x="-0.7" data-y="2.8" x="206.44444444444446" y="214.22222222222223" width="28" height="37.33333333333334" fill="rgba(220, 38, 38, 0.22)" stroke="#b91c1c" stroke-width="0.03214285714285715"/></g><g><rect data-type="rect" data-label="self pad" data-x="0.35" data-y="-1.4" x="240.66666666666669" y="351.1111111111111" width="24.888888888888857" height="24.888888888888914" fill="rgba(220, 38, 38, 0.22)" stroke="#b91c1c" stroke-width="0.03214285714285715"/></g><g><circle data-type="point" data-label="inside pad source_port_right_1" data-x="1.4" data-y="-1.05" cx="285.77777777777777" cy="352.6666666666667" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_right_2" data-x="1.4" data-y="1.05" cx="285.77777777777777" cy="287.3333333333333" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_top" data-x="-0.35" data-y="1.4" cx="231.33333333333334" cy="276.44444444444446" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_bottom" data-x="0.35" data-y="-1.4" cx="253.11111111111111" cy="363.55555555555554" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="outside target source_port_header_right_1" data-x="10" data-y="-1.05" cx="553.3333333333333" cy="352.6666666666667" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_header_right_2" data-x="10" data-y="1.05" cx="553.3333333333333" cy="287.3333333333333" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_header_top" data-x="-0.35" data-y="9" cx="231.33333333333334" cy="40" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_header_bottom" data-x="0.35" data-y="-9" cx="253.11111111111111" cy="600" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="selected breakout source_port_right_1" data-x="5" data-y="-2" cx="397.77777777777777" cy="382.22222222222223" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_right_2" data-x="5" data-y="2.5" cx="397.77777777777777" cy="242.22222222222223" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_top" data-x="0" data-y="4" cx="242.22222222222223" cy="195.55555555555554" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_bottom" data-x="0.35" data-y="-4" cx="253.11111111111111" cy="444.44444444444446" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="5" data-y="-0.5" cx="397.77777777777777" cy="335.55555555555554" r="3" fill="#ef6c00"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="0.5" data-y="4" cx="257.77777777777777" cy="195.55555555555554" r="3" fill="#ef6c00"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":31.11111111111111,"c":0,"e":242.22222222222223,"b":0,"d":-31.11111111111111,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>