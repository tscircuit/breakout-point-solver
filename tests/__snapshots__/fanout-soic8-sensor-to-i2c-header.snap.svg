ill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_j1_scl" data-x="-6" data-y="3.81" cx="72.23330775134303" cy="156.25479662317727" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_vcc" data-x="-4.4" data-y="0.7999999999999998" cx="140.99769762087487" cy="285.61780506523405" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_gnd" data-x="-4.4" data-y="-1.5338961038961039" cx="140.99769762087487" cy="385.92339356729224" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_sda" data-x="-4.4" data-y="1.5338961038961039" cx="140.99769762087487" cy="254.07660643270773" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_scl" data-x="-4.4" data-y="2.490519480519481" cx="140.99769762087487" cy="212.96309216493404" r="3" fill="#0d47a1"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":42.97774366845741,"c":0,"e":330.0997697620875,"b":0,"d":-42.97774366845741,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>