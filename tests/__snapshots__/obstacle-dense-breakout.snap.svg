"345.45454545454544" r="3" fill="#ef6c00"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="6" data-y="1" cx="472.72727272727275" cy="294.54545454545456" r="3" fill="#ef6c00"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="-6" data-y="0.5" cx="167.27272727272728" cy="307.27272727272725" r="3" fill="#ef6c00"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="-1" data-y="5" cx="294.54545454545456" cy="192.72727272727275" r="3" fill="#ef6c00"/></g><g><circle data-type="point" data-label="pre-existing breakout point" data-x="1" data-y="-5" cx="345.45454545454544" cy="447.27272727272725" r="3" fill="#ef6c00"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":25.454545454545453,"c":0,"e":320,"b":0,"d":-25.454545454545453,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>