roke-width="0.021964285714285717"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_vcc" data-x="-0.75" data-y="-2.4" cx="256.260162601626" cy="431.54471544715443" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_gnd" data-x="-0.25" data-y="-2.4" cx="279.0243902439024" cy="431.54471544715443" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_sda" data-x="0.25" data-y="-2.4" cx="301.7886178861788" cy="431.54471544715443" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_scl" data-x="0.75" data-y="-2.4" cx="324.55284552845524" cy="431.54471544715443" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="outside target source_port_j1_vcc" data-x="6" data-y="-1.905" cx="563.5772357723577" cy="409.0081300813008" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_j1_gnd" data-x="6" data-y="-0.635" cx="563.5772357723577" cy="351.18699186991864" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_j1_sda" data-x="6" data-y="0.635" cx="563.5772357723577" cy="293.3658536585366" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_j1_scl" data-x="6" data-y="1.905" cx="563.5772357723577" cy="235.54471544715446" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_vcc" data-x="-0.2999999999999998" data-y="-3.5" cx="276.7479674796748" cy="481.6260162601626" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_gnd" data-x="0.20000000000000018" data-y="-3.5" cx="299.5121951219512" cy="481.6260162601626" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_sda" data-x="3" data-y="3.5" cx="426.99186991869914" cy="162.92682926829266" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_scl" data-x="3" data-y="-1" cx="426.99186991869914" cy="367.80487804878044" r="3" fill="#0d47a1"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":45.52845528455284,"c":0,"e":290.4065040650406,"b":0,"d":-45.52845528455284,"f":322.2764227642276};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>