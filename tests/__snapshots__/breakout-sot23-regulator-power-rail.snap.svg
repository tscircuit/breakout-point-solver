 pad source_port_u1_gnd" data-x="-1.1375" data-y="-0.95" cx="280.286783042394" cy="386.6832917705736" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_gnd" data-x="-1.1375" data-y="-0.95" cx="280.286783042394" cy="386.6832917705736" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="inside pad source_port_u1_vout" data-x="1.1375" data-y="0" cx="359.713216957606" cy="353.51620947630926" r="3" fill="#1b5e20"/></g><g><circle data-type="point" data-label="outside target source_port_jin_vin" data-x="-7.27" data-y="-1" cx="66.18453865336656" cy="388.42892768079804" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_jin_gnd" data-x="-4.73" data-y="-1" cx="154.86284289276804" cy="388.42892768079804" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_jout_gnd" data-x="7.27" data-y="-1" cx="573.8154613466335" cy="388.42892768079804" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="outside target source_port_jout_vout" data-x="4.73" data-y="-1" cx="485.1371571072319" cy="388.42892768079804" r="3" fill="#6a1b9a"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_vin" data-x="-4.2" data-y="0.6000000000000001" cx="173.3665835411471" cy="332.56857855361596" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_gnd" data-x="-4.2" data-y="-1.9" cx="173.3665835411471" cy="419.8503740648379" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_gnd" data-x="4.2" data-y="-2.4" cx="466.63341645885293" cy="437.3067331670823" r="3" fill="#0d47a1"/></g><g><circle data-type="point" data-label="selected breakout source_port_u1_vout" data-x="4.2" data-y="0.10000000000000009" cx="466.63341645885293" cy="350.02493765586036" r="3" fill="#0d47a1"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":34.91271820448878,"c":0,"e":320,"b":0,"d":-34.91271820448878,"f":353.51620947630926};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>